name: Discover Manus Projects

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  list-projects:
    runs-on: ubuntu-latest

    steps:
      - name: List Manus projects
        env:
          MANUS_API_KEY: ${{ secrets.MANUS_API_KEY }}
          MANUS_API_TOKEN: ${{ secrets.MANUS_API_TOKEN }}
        shell: bash
        run: |
          if [ -z "${MANUS_API_KEY}" ] && [ -n "${MANUS_API_TOKEN}" ]; then
            MANUS_API_KEY="${MANUS_API_TOKEN}"
          fi

          if [ -z "${MANUS_API_KEY}" ]; then
            echo "::error::Missing repository secret MANUS_API_KEY or MANUS_API_TOKEN."
            exit 1
          fi

          HTTP_STATUS=$(curl -sS -o manus-projects-v2.json -w "%{http_code}" \
            -H "x-manus-api-key: ${MANUS_API_KEY}" \
            "https://api.manus.ai/v2/project.list")

          if [ "${HTTP_STATUS}" -lt 200 ] || [ "${HTTP_STATUS}" -ge 300 ]; then
            echo "::error::Manus API returned HTTP ${HTTP_STATUS}."
            cat manus-projects-v2.json
            exit 1
          fi

          echo "v2 response:"
          cat manus-projects-v2.json
          echo
          echo "v2 projects:"
          jq -r '(.data // [])[] | "id=\(.id) name=\(.name)"' manus-projects-v2.json

          HTTP_STATUS_V1=$(curl -sS -o manus-projects-v1.json -w "%{http_code}" \
            -H "API_KEY: ${MANUS_API_KEY}" \
            "https://api.manus.ai/v1/projects?limit=100")

          if [ "${HTTP_STATUS_V1}" -lt 200 ] || [ "${HTTP_STATUS_V1}" -ge 300 ]; then
            echo "v1 returned HTTP ${HTTP_STATUS_V1}:"
            cat manus-projects-v1.json
            exit 0
          fi

          echo "v1 response:"
          cat manus-projects-v1.json
          echo
          echo "v1 projects:"
          jq -r '(.data // [])[] | "id=\(.id) name=\(.name)"' manus-projects-v1.json
