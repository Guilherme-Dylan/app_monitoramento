name: Sync Codex Changes to Manus

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: manus-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate-and-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm run check

      - name: Run tests
        run: pnpm test

      - name: Build project
        run: pnpm build

      - name: Collect commit metadata
        id: commit
        shell: bash
        run: |
          {
            echo "author=$(git log -1 --pretty=format:'%an')"
            echo "email=$(git log -1 --pretty=format:'%ae')"
            echo "hash=$(git log -1 --pretty=format:'%H')"
            echo "short_hash=$(git log -1 --pretty=format:'%h')"
            echo "message=$(git log -1 --pretty=format:'%s')"
          } >> "$GITHUB_OUTPUT"

      - name: Ask Manus to sync connected project
        env:
          MANUS_API_KEY: ${{ secrets.MANUS_API_KEY }}
          MANUS_API_TOKEN: ${{ secrets.MANUS_API_TOKEN }}
          MANUS_TARGET_TASK_ID: ${{ secrets.MANUS_TARGET_TASK_ID }}
          MANUS_SITE_URL: https://monitapp-kzszuqk2.manus.space
          REPOSITORY_URL: https://github.com/${{ github.repository }}
          COMMIT_AUTHOR: ${{ steps.commit.outputs.author }}
          COMMIT_EMAIL: ${{ steps.commit.outputs.email }}
          COMMIT_HASH: ${{ steps.commit.outputs.hash }}
          COMMIT_SHORT_HASH: ${{ steps.commit.outputs.short_hash }}
          COMMIT_MESSAGE: ${{ steps.commit.outputs.message }}
        shell: bash
        run: |
          if [ -z "${MANUS_API_KEY}" ] && [ -n "${MANUS_API_TOKEN}" ]; then
            MANUS_API_KEY="${MANUS_API_TOKEN}"
          fi

          if [ -z "${MANUS_API_KEY}" ]; then
            echo "::error::Missing repository secret MANUS_API_KEY or MANUS_API_TOKEN."
            echo "Create it in GitHub: Settings > Secrets and variables > Actions > New repository secret."
            exit 1
          fi

          if [ -z "${MANUS_TARGET_TASK_ID}" ]; then
            echo "::warning::MANUS_TARGET_TASK_ID is not configured; validation passed, but Manus sync was skipped."
            echo "Set MANUS_TARGET_TASK_ID to the Manus task id that owns the connected app."
            exit 0
          fi

          PROMPT=$(printf '%s\n' \
            "Sincronize agora o projeto Manus conectado ao GitHub e publique a versão atualizada." \
            "" \
            "Repositório: ${REPOSITORY_URL}" \
            "Branch: main" \
            "Commit: ${COMMIT_HASH}" \
            "Autor: ${COMMIT_AUTHOR} <${COMMIT_EMAIL}>" \
            "Mensagem: ${COMMIT_MESSAGE}" \
            "Site atual: ${MANUS_SITE_URL}" \
            "" \
            "Instruções:" \
            "1. Use a integração GitHub já conectada no Manus para atualizar o projeto pela branch main." \
            "2. Aplique as mudanças no app Manus existente, sem criar um novo app." \
            "3. Preserve variáveis de ambiente, banco de dados, domínios e configurações existentes." \
            "4. Publique o app atualizado em ${MANUS_SITE_URL}." \
            "5. Ao terminar, confirme se a publicação foi feita ou relate o erro encontrado.")

          jq -n \
            --arg prompt "$PROMPT" \
            --arg task_id "$MANUS_TARGET_TASK_ID" \
            '{
              task_id: $task_id,
              agent_profile: "manus-1.6-lite",
              message: {
                content: [
                  {
                    type: "text",
                    text: $prompt
                  }
                ]
              }
            }' > manus-message.json

          HTTP_STATUS=$(curl -sS -o manus-response.json -w "%{http_code}" \
            -X POST "https://api.manus.ai/v2/task.sendMessage" \
            -H "Content-Type: application/json" \
            -H "x-manus-api-key: ${MANUS_API_KEY}" \
            --data @manus-message.json)

          cat manus-response.json
          echo

          if [ "${HTTP_STATUS}" -lt 200 ] || [ "${HTTP_STATUS}" -ge 300 ]; then
            echo "::error::Manus API returned HTTP ${HTTP_STATUS}."
            exit 1
          fi

          OK=$(jq -r '.ok // false' manus-response.json)

          if [ "${OK}" != "true" ]; then
            echo "::error::Manus API did not accept the sync message."
            exit 1
          fi

          echo "Manus sync message sent successfully."
          echo "Task ID: ${MANUS_TARGET_TASK_ID}"
          echo "Target site: ${MANUS_SITE_URL}"
