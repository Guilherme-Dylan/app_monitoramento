name: Auto Deploy to Manus

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
      OAUTH_SERVER_URL: http://localhost:4000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Wait for PostgreSQL
        run: |
          echo "Esperando PostgreSQL iniciar..."
          for i in {1..10}; do
            pg_isready -h localhost -p 5432 -U postgres && break
            echo "Aguardando banco... $i"
            sleep 5
          done

      - name: Run database migrations
        run: pnpm run migrate

      - name: Seed database
        run: pnpm run seed

      - name: Run tests
        run: pnpm test

      - name: Build project
        run: pnpm build

      - name: Notify deployment
        if: success()
        run: |
          echo "✅ Build e testes passaram com sucesso!"
          echo "📦 Projeto pronto para deploy"
          echo "🚀 Para publicar, acesse o Management UI e clique em 'Publish'"
